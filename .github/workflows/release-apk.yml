name: Build & Release WhiteVPN

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Create Release Zip
        run: |
          zip -r WhiteVPN-Release-v1.0.zip public/ server.js start-as-admin.bat package.json README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: WhiteVPN-Release-v1.0.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
