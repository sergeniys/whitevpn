name: Build & Release KartseVPN Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm install -g @capacitor/cli @capacitor/core @capacitor/android
          npm install

      - name: Initialize Capacitor Android Project
        run: |
          npx cap init KartseVPN com.kartsevpn.app --web-dir public
          npx cap add android
          npx cap copy android

      - name: Build Android APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk ../KartseVPN-v1.1.0.apk

      - name: Create GitHub Release & Upload APK
        uses: softprops/action-gh-release@v1
        with:
          files: KartseVPN-v1.1.0.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
